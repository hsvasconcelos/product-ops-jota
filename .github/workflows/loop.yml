name: loop-continuo

# O "aprende" do diagrama rodando SOZINHO — governado.
# Diário: lê a telemetria,
# roda recalibração + esteira + detecção proposta, publica o boletim como
# artefato do run e TENTA abrir um PR com a proposta. O PR é o gate (o CI roda
# nele) e o merge é o sign-off humano — nunca commita na main.
#
# Robusto de propósito: o loop e o artefato são o que importa; abrir PR depende
# de uma permissão do repo (Settings → Actions → "Allow GitHub Actions to create
# and approve pull requests"). Se essa permissão estiver off, o passo do PR é
# pulado sem derrubar o run (continue-on-error) — nada de e-mail de falha à toa.
#
# Leve: usa a decisão JÁ gravada nos traces/lab (sem re-rodar ML). Dá pra
# disparar na mão (workflow_dispatch) para a demo.

on:
  schedule:
    - cron: "0 9 * * *"      # 06h BRT (09h UTC), diariamente
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  aprender:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: instalar (deps leves — sem torch)
        run: pip install -e .
      - name: rodar o loop (recalibração + esteira + detecção proposta)
        run: JOTA_PY=python python scripts/loop_continuo.py
      - name: publicar o boletim como artefato (sempre)
        uses: actions/upload-artifact@v4
        with:
          name: boletim-aprendizado
          path: |
            data/aprendizado.json
            data/recalibracao.json
            data/promocao.json
      - name: abrir PR com o boletim (se a permissão do repo permitir)
        continue-on-error: true
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "loop: boletim de aprendizado (automático)"
          title: "🔁 Loop contínuo — proposta de aprendizado"
          body: |
            Boletim gerado pelo loop contínuo (recalibração + esteira + detecção proposta).
            **Nada foi aplicado** — este PR é a proposta. O CI valida os contratos; o merge é o sign-off.
            Veja `data/aprendizado.json`.
          branch: loop/aprendizado
          delete-branch: true
          add-paths: |
            data/aprendizado.json
            data/recalibracao.json
            data/promocao.json
